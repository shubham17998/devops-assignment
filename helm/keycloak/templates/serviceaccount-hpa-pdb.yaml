################################################################################
# Service Account for Keycloak pods
################################################################################
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "keycloak.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}

---
{{- if .Values.keycloak.autoscaling.enabled }}
################################################################################
# Horizontal Pod Autoscaler
################################################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "keycloak.fullname" . }}-{{ .Values.slot }}
  minReplicas: {{ .Values.keycloak.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.keycloak.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.keycloak.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.keycloak.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}

---
{{- if .Values.keycloak.podDisruptionBudget.enabled }}
################################################################################
# Pod Disruption Budget — ensures HA during node drains/upgrades
################################################################################
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.keycloak.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
{{- end }}

---
{{- if .Values.storageClass.create }}
################################################################################
# StorageClass — gp3 (better throughput/IOPS than gp2, same cost)
################################################################################
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ .Values.storageClass.name }}
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: {{ .Values.storageClass.provisioner }}
parameters:
  {{- toYaml .Values.storageClass.parameters | nindent 2 }}
reclaimPolicy: {{ .Values.storageClass.reclaimPolicy }}
allowVolumeExpansion: {{ .Values.storageClass.allowVolumeExpansion }}
volumeBindingMode: WaitForFirstConsumer
{{- end }}
