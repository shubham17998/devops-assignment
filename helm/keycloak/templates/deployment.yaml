apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keycloak.fullname" . }}-{{ .Values.slot }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    # Trigger rolling restart when config changes
    checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
spec:
  replicas: {{ .Values.keycloak.replicaCount }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
      annotations:
        {{- toYaml .Values.keycloak.podAnnotations | nindent 8 }}
    spec:
      serviceAccountName: {{ include "keycloak.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.keycloak.securityContext | nindent 8 }}

      # Wait for PostgreSQL to be ready before starting Keycloak
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "keycloak.postgresql.fullname" . }} 5432; do
                echo "Waiting for PostgreSQL...";
                sleep 2;
              done
              echo "PostgreSQL is ready."

      containers:
        - name: keycloak
          image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          args:
            {{- toYaml .Values.keycloak.args | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP

          env:
            # Database connection — values from External Secret
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              value: "jdbc:postgresql://{{ include "keycloak.postgresql.fullname" . }}:5432/{{ .Values.postgresql.database }}"
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-secret
                  key: password
            # Admin credentials — from External Secret
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: password
            # Static config from values
            {{- range $key, $value := .Values.keycloak.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          livenessProbe:
            {{- toYaml .Values.keycloak.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.keycloak.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.keycloak.startupProbe | nindent 12 }}

          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}

      {{- with .Values.keycloak.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Graceful termination
      terminationGracePeriodSeconds: 60
