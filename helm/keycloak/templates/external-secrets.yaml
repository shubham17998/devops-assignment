{{- if .Values.externalSecrets.enabled }}
################################################################################
# SecretStore — connects External Secrets Operator to AWS Secrets Manager
################################################################################
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.awsRegion }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets

---
################################################################################
# ExternalSecret — Keycloak admin credentials
################################################################################
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin-external-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: keycloak-admin-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.keycloakAdmin.remoteSecretName }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.keycloakAdmin.remoteSecretName }}
        property: password

---
################################################################################
# ExternalSecret — PostgreSQL Keycloak user credentials
################################################################################
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-db-external-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: keycloak-db-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.externalSecrets.keycloakDb.remoteSecretName }}
        property: username
    - secretKey: password
      remoteRef:
        key: {{ .Values.externalSecrets.keycloakDb.remoteSecretName }}
        property: password
    - secretKey: host
      remoteRef:
        key: {{ .Values.externalSecrets.keycloakDb.remoteSecretName }}
        property: host

{{- end }}
